AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Terrain splitter backend deployed as an AWS Lambda Function URL

Parameters:
  StageName:
    Type: String
    Default: prod
  MapboxToken:
    Type: String
    NoEcho: true
    Description: Mapbox token used by the terrain splitter backend to fetch terrain-rgb tiles.
  AllowedOrigin:
    Type: String
    Default: "*"
    Description: CORS origin for the Lambda Function URL.
  RootParallelWorkers:
    Type: Number
    Default: 6
    Description: Number of root split branches to evaluate in parallel via Lambda self-invocation.
  RootParallelGranularity:
    Type: String
    Default: subtree
    AllowedValues:
      - branch
      - subtree
    Description: Whether Lambda fan-out dispatches whole root branches or individual left/right subtrees.
  RootParallelMaxInflight:
    Type: Number
    Default: 16
    Description: Maximum number of internal Lambda self-invocations allowed in flight at once during root fan-out.
  LambdaInvokeReadTimeoutSec:
    Type: Number
    Default: 300
    Description: Read timeout in seconds for synchronous internal Lambda self-invokes used during root fan-out.
  NestedLambdaMinCells:
    Type: Number
    Default: 64
    Description: Minimum subtree cell count required before a subtree worker is allowed to fan out again via Lambda.
  NestedLambdaMaxInflight:
    Type: Number
    Default: 8
    Description: Maximum number of nested Lambda subtree self-invocations allowed in flight per worker.

Globals:
  Function:
    Runtime: python3.11
    Timeout: 900
    MemorySize: 10240
    Architectures:
      - x86_64
    Environment:
      Variables:
        MAPBOX_TOKEN: !Ref MapboxToken
        TERRAIN_SPLITTER_CACHE_DIR: /tmp/terrain-splitter/cache
        TERRAIN_SPLITTER_DEBUG_DIR: /tmp/terrain-splitter/debug
        TERRAIN_SPLITTER_DSM_DIR: /tmp/terrain-splitter/dsm
        TERRAIN_SPLITTER_DSM_STORE_MODE: "s3"
        TERRAIN_SPLITTER_DSM_S3_BUCKET: !Ref TerrainSplitterDsmBucket
        TERRAIN_SPLITTER_DSM_S3_PREFIX: !Ref StageName
        TERRAIN_SPLITTER_ENABLE_APP_CORS: "false"
        TERRAIN_SPLITTER_ROOT_PARALLEL_MODE: "lambda"
        TERRAIN_SPLITTER_ROOT_PARALLEL_WORKERS: !Ref RootParallelWorkers
        TERRAIN_SPLITTER_ROOT_PARALLEL_GRANULARITY: !Ref RootParallelGranularity
        TERRAIN_SPLITTER_ROOT_PARALLEL_MAX_INFLIGHT: !Ref RootParallelMaxInflight
        TERRAIN_SPLITTER_LAMBDA_INVOKE_READ_TIMEOUT_SEC: !Ref LambdaInvokeReadTimeoutSec
        TERRAIN_SPLITTER_NESTED_LAMBDA_MIN_CELLS: !Ref NestedLambdaMinCells
        TERRAIN_SPLITTER_NESTED_LAMBDA_MAX_INFLIGHT: !Ref NestedLambdaMaxInflight
        PYTHONPATH: /var/task

Resources:
  TerrainSplitterDsmBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  TerrainSplitterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-terrain-splitter"
      Handler: main.lambda_handler
      CodeUri: .
      Description: Terrain-aware polygon partition solver
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-terrain-splitter"
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt TerrainSplitterDsmBucket.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "${TerrainSplitterDsmBucket.Arn}/*"
      EphemeralStorage:
        Size: 2048

  TerrainSplitterFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref TerrainSplitterFunction
      AuthType: NONE
      Cors:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - "*"
        ExposeHeaders:
          - "*"
        MaxAge: 3600

  TerrainSplitterFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TerrainSplitterFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

Outputs:
  TerrainSplitterFunctionUrl:
    Description: Lambda Function URL for the terrain splitter backend
    Value: !GetAtt TerrainSplitterFunctionUrl.FunctionUrl
  TerrainSplitterDsmBucketName:
    Description: S3 bucket backing DSM datasets for the terrain splitter backend
    Value: !Ref TerrainSplitterDsmBucket
