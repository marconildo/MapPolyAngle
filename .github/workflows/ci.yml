name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - codex/**
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:terrain-split
      - run: npm run test:terrain-objective
      - run: npm run test:terrain-graph

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "backend/terrain_splitter[test]"
      - run: python -m ruff check backend/terrain_splitter
      - run: python -m pytest -q backend/terrain_splitter/tests
